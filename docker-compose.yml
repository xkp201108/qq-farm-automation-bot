version: '3.8'

services:
  qq-farm-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qq-farm-bot
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PORT=3000
      - ADMIN_HOST=0.0.0.0
      # 您可以添加其他环境变量
      # - LOG_LEVEL=info
    volumes:
      # 挂载卷用于持久化数据（如果应用需要）
      # - ./data:/app/data
      # - ./logs:/app/logs
    networks:
      - qq-farm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  qq-farm-network:
    driver: bridge
